<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Real Estate - Prix au m² · UY1</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --accent: #f59e0b;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --success: #10b981;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.5; }

        header {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            padding: 3rem 1rem 5rem;
            text-align: center;
        }

        main { max-width: 850px; margin: -3rem auto 3rem; padding: 0 1rem; }

        .tabs {
            display: flex;
            background: white;
            padding: 0.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
            color: #64748b;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .view { display: none; background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .view.active { display: block; }

        .section-title { margin: 1.5rem 0 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; color: var(--secondary); font-weight: bold; }
        
        .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 1.5rem; }
        .cat-card {
            border: 2px solid #e2e8f0;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .cat-title { font-weight: bold; font-size: 1rem; margin-bottom: 4px; }
        .cat-desc { font-size: 0.8rem; color: #64748b; }
        
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .cat-card {
            border-color: var(--primary);
            background: #eff6ff;
        }
        input[type="radio"]:checked + .cat-card .cat-title { color: var(--primary); }

        .criteria-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            background: #f8fafc;
            padding: 1.2rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }
        .item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; cursor: pointer; }
        .item input { width: 18px; height: 18px; accent-color: var(--primary); }

        .input-price {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 2rem;
            transition: 0.2s;
        }
        .btn-submit:hover { background: var(--secondary); transform: translateY(-2px); }

        .result { margin-top: 1.5rem; padding: 1.5rem; border-radius: 10px; display: none; animation: slideUp 0.4s; }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .title-bonus {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #cbd5e1;
        }

        footer { text-align: center; padding: 2rem; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>🏠 Estimation du Prix au m²</h1>
    <p>Intelligence Artificielle • Régression Linéaire • Immobilier</p>
</header>

<main>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('pred')">🔮 Prédiction</button>
        <button class="tab-btn" onclick="showTab('train')">📊 Enrichissement</button>
    </div>

    <div id="pred-view" class="view active">
        <form onsubmit="handleSubmit(event, 'prediction')">
            <div id="form-content-pred"></div>
            <button type="submit" class="btn-submit">Estimer le prix au m²</button>
        </form>
        <div id="pred-res" class="result"></div>
    </div>

    <div id="train-view" class="view">
        <form onsubmit="handleSubmit(event, 'train')">
            <div id="form-content-train"></div>
            <div class="section-title">💰 Prix au m² constaté (sans titre foncier)</div>
            <input type="number" id="t-valeur" class="input-price" placeholder="Prix réel au m² (ex: 25 000)" required>
            <button type="submit" class="btn-submit" style="background: var(--accent);">Ajouter au modèle</button>
        </form>
        <div id="train-res" class="result"></div>
    </div>
</main>

<footer>
    Projet TCHOUANBOU JEAN NELSON • 2025-2026<br>
    Informatique Niveau 2 • Université de Yaoundé 1
</footer>

<script>
    const API_URL = "https://tchouanbou-jean-nelson-24f2830tpinf232-production.up.railway.app";

    const categories = [
        { val: 1, title: "1 - Zone de Prestige / Centre", desc: "Hyper-centre, quartiers résidentiels de luxe ou administratifs." },
        { val: 2, title: "2 - Zone Urbaine Développée", desc: "Quartiers structurés, accès facile aux services et commerces." },
        { val: 3, title: "3 - Quartier en Expansion", desc: "Zone urbaine dense, classe moyenne, en cours de structuration." },
        { val: 4, title: "4 - Périphérie / Zone Rurale", desc: "Zone lointaine, accès parfois difficile ou enclavé." }
    ];

    const criteriaHTML = (prefix) => `
        <div class="section-title">📂 Catégorie de la zone (Priorité 1 = Max)</div>
        <div class="cat-grid">
            ${categories.map(c => `
                <label>
                    <input type="radio" name="${prefix}-cat" value="${c.val}" ${c.val===1?'checked':''} required>
                    <div class="cat-card">
                        <span class="cat-title">${c.title}</span>
                        <span class="cat-desc">${c.desc}</span>
                    </div>
                </label>
            `).join('')}
        </div>

        <div class="section-title">🏗️ Viabilité physique (10 pts)</div>
        <div class="criteria-list" id="${prefix}-viability">
            <label class="item"><input type="checkbox" value="1" checked disabled> Sécurité / Gardiennage</label>
            <label class="item"><input type="checkbox" value="1"> Réseau Électrique présent</label>
            <label class="item"><input type="checkbox" value="1"> Accès Eau (Réseau public)</label>
            <label class="item"><input type="checkbox" value="1"> Éclairage Public</label>
            <label class="item"><input type="checkbox" value="1"> Couverture réseau/Internet</label>
            <label class="item"><input type="checkbox" value="1"> Voisinage Calme</label>
            <label class="item"><input type="checkbox" value="1"> Système de drainage/égouts</label>
            <label class="item"><input type="checkbox" value="1"> Terrain Plat / Non marécageux</label>
            <label class="item"><input type="checkbox" value="1"> Proximité d'un marché</label>
            <label class="item"><input type="checkbox" value="1"> Écoles ou hôpitaux proches</label>
        </div>

        <div class="section-title">📍 Position Stratégique (10 pts)</div>
        <div class="criteria-list" id="${prefix}-position">
            <label class="item"><input type="checkbox" value="2"> Axe routier principal</label>
            <label class="item"><input type="checkbox" value="2"> Accès goudronné</label>
            <label class="item"><input type="checkbox" value="2"> Proche Centre-ville</label>
            <label class="item"><input type="checkbox" value="2"> Proche Aéroport/Gare</label>
            <label class="item"><input type="checkbox" value="2"> Infrastructures Majeures (Stade...)</label>
        </div>
    `;

    document.getElementById('form-content-pred').innerHTML = criteriaHTML('p');
    document.getElementById('form-content-train').innerHTML = criteriaHTML('t');

    function showTab(type) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(type + '-view').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function getScore(id) {
        let score = 0;
        document.querySelectorAll(`#${id} input:checked`).forEach(i => score += parseInt(i.value));
        return score;
    }

    async function handleSubmit(event, mode) {
        event.preventDefault();
        const prefix = mode === 'prediction' ? 'p' : 't';
        const resDiv = document.getElementById(mode === 'prediction' ? 'pred-res' : 'train-res');
        
        const cat = document.querySelector(`input[name="${prefix}-cat"]:checked`).value;
        const viab = getScore(`${prefix}-viability`);
        const pos = getScore(`${prefix}-position`);

        resDiv.style.display = "block";
        resDiv.style.background = "#f1f5f9";
        resDiv.innerHTML = "⌛ Analyse du modèle IA en cours...";

        let url = `${API_URL}/${mode === 'prediction' ? 'prediction' : 'entrener'}?categorie=${cat}&viabilite=${viab}&position=${pos}`;
        if(mode === 'train') url += `&valeur=${document.getElementById('t-valeur').value}`;

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            resDiv.style.background = "#ecfdf5";
            resDiv.style.border = "1px solid #10b981";
            
            if(mode === 'prediction') {
                const baseValue = data.prediction;
                const titledValue = baseValue * 1.70;

                resDiv.innerHTML = `
                    <div style="font-size: 0.9rem; color: #64748b">Estimation du prix au m² (terrain brut) :</div>
                    <div style="font-size: 1.8rem; font-weight: bold; color: #0f172a">${baseValue.toLocaleString('fr-FR', {maximumFractionDigits: 0})} FCFA / m²</div>
                    
                    <div class="title-bonus">
                        <div style="font-size: 1.1rem; color: #b45309; font-weight: bold;">📜 Avec Titre Foncier (+70% au m²)</div>
                        <div style="font-size: 2.2rem; font-weight: bold; color: #d97706">${titledValue.toLocaleString('fr-FR', {maximumFractionDigits: 0})} FCFA / m²</div>
                        <p style="margin-top: 8px; font-size: 0.85rem; color: #475569">
                            La présence d'un titre foncier sécurise l'investissement et augmente la valeur marchande de 70% par rapport à l'estimation physique brute.
                        </p>
                    </div>

                    <div style="margin-top: 20px; font-size: 0.8rem; color: #94a3b8; text-align: right;">Précision statistique (R²) : ${(data.coef_determination*100).toFixed(2)}%</div>
                `;
            } else {
                resDiv.innerHTML = `✅ Donnée enregistrée ! Le modèle s'est affiné avec vos informations (R² : ${data.coef_determination.toFixed(4)})`;
            }
        } catch (err) {
            resDiv.style.background = "#fef2f2";
            resDiv.style.border = "1px solid #ef4444";
            resDiv.innerHTML = "❌ Impossible de contacter le serveur Railway. Vérifiez la connexion API.";
        }
    }
</script>
</body>
</html>
